name: CI/CD FlowFinance

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint || true

      - name: Type check
        run: npx tsc --noEmit || true

      - name: Build Next.js app
        run: npm run build
        env:
          DATABASE_URL: "mysql://root:test@localhost:3306/test"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_dummy"
          CLERK_SECRET_KEY: "sk_test_dummy"
          TELEGRAM_BOT_TOKEN: "dummy_token"

  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Push schema to test DB
        run: npx prisma db push
        env:
          DATABASE_URL: "mysql://root:test_password@localhost:3306/test_db"

      - name: Run tests
        run: npm test || true
        env:
          DATABASE_URL: "mysql://root:test_password@localhost:3306/test_db"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_dummy"
          CLERK_SECRET_KEY: "sk_test_dummy"
          TELEGRAM_BOT_TOKEN: "dummy_token"

  docker:
    needs: [build, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t flowfinance:latest .
          echo "Docker image built successfully"

      - name: Test Docker container
        run: |
          docker run -d --name flowfinance-test -p 3000:3000 \
            -e DATABASE_URL="mysql://root:test@host.docker.internal:3306/test" \
            -e NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="pk_test" \
            -e CLERK_SECRET_KEY="sk_test" \
            -e TELEGRAM_BOT_TOKEN="test" \
            flowfinance:latest
          sleep 10
          curl -f http://localhost:3000 || exit 1
          docker stop flowfinance-test
